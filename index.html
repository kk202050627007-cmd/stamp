<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Stamp Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&family=Playfair+Display:wght@400;600&family=Courier+Prime&family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet"/>
<style>
@font-face{font-family:'OPPO Sans';font-weight:400;src:url('https://cdn.jsdelivr.net/gh/wordshub/free-font@master/assets/font/O/OPPOSans-R.ttf') format('truetype')}
@font-face{font-family:'OPPO Sans';font-weight:700;src:url('https://cdn.jsdelivr.net/gh/wordshub/free-font@master/assets/font/O/OPPOSans-B.ttf') format('truetype')}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#111;-webkit-font-smoothing:antialiased}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#ddd;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
select{-webkit-appearance:none;appearance:none}
.txt-input{width:100%;background:#222;border:1px solid #2E2E2E;color:#eee;padding:7px 9px;font-size:16px;border-radius:3px;outline:none}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
#crop-wrap{position:absolute;overflow:hidden;touch-action:none;cursor:grab}
#crop-wrap:active{cursor:grabbing}
#crop-img{position:absolute;transform-origin:0 0;will-change:transform;display:block;user-select:none;-webkit-user-drag:none;max-width:none}
.crop-hint{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.45);pointer-events:none}
#export-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#export-overlay.show{display:flex}
#export-overlay img{max-width:100%;max-height:60vh;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.exp-hint{font-size:13px;color:#aaa;letter-spacing:.08em;text-align:center;line-height:1.6}
.exp-close{background:#222;border:1px solid #444;color:#eee;padding:10px 32px;border-radius:3px;font-size:12px;letter-spacing:.15em;cursor:pointer}
</style>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<!-- ═══ 静态骨架：只渲染一次，之后只改属性 ═══ -->
<div id="app">
  <!-- header -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #1E1E1E;background:#161616;position:sticky;top:0;z-index:10">
    <div style="font-size:12px;font-weight:700;letter-spacing:.25em;color:#fff;text-transform:uppercase">Stamp Maker</div>
    <button id="btn-upload" style="background:#222;border:1px solid #333;color:#aaa;padding:6px 16px;font-size:11px;letter-spacing:.12em;border-radius:3px;cursor:pointer">+ 上传图片</button>
    <input id="filein" type="file" accept="image/*" style="display:none"/>
  </div>

  <!-- preview -->
  <div style="display:flex;align-items:center;justify-content:center;padding:20px 0;background:#111;overflow:visible">
    <div id="stamp-export" style="position:relative;flex-shrink:0;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.55);overflow:visible">
      <!-- bg layer -->
      <div id="stamp-bg" style="position:absolute;inset:0;border-radius:6px"></div>
      <!-- stamp layer -->
      <div id="stamp-inner" style="position:absolute">
        <svg id="stamp-svg" style="position:absolute;top:0;left:0;overflow:visible">
          <path id="svg-outer"/>
          <path id="svg-inner" fill="none" stroke-width=".7" opacity=".28"/>
        </svg>
        <!-- image area -->
        <div id="crop-wrap" style="position:absolute;overflow:hidden;touch-action:none">
          <img id="crop-img" style="position:absolute;transform-origin:0 0;will-change:transform;display:none;max-width:none"/>
          <div id="img-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:.15em;opacity:.35">UPLOAD IMAGE</div>
          <div class="crop-hint" id="crop-hint" style="display:none">双指缩放 · 拖动调整</div>
          <div style="position:absolute;inset:0;pointer-events:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27200%27 height=%27200%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.85%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%25%27 height=%27100%25%27 filter=%27url(%23n)%27 opacity=%270.055%27/%3E%3C/svg%3E');mix-blend-mode:multiply"></div>
        </div>
        <!-- text area -->
        <div id="stamp-text" style="position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
          <div id="txt-meta" style="font-size:8.5px;letter-spacing:.22em;opacity:.6"></div>
          <div id="txt-city-zh" style="font-weight:600;letter-spacing:.04em;line-height:1.15;text-align:center"></div>
          <div id="txt-city-en" style="font-size:8px;letter-spacing:.2em;opacity:.55;text-align:center"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- geo bar -->
  <div id="geo-bar" style="display:none"></div>

  <!-- controls -->
  <div style="background:#161616;border-top:1px solid #1E1E1E;flex:1;display:flex;flex-direction:column">
    <!-- tabs -->
    <div style="display:flex;border-bottom:1px solid #1E1E1E">
      <button data-tab="color" style="flex:1;padding:12px 0;font-size:10px;letter-spacing:.12em;border:none;cursor:pointer;text-transform:uppercase;background:#1E1E1E;border-bottom:2px solid #fff;color:#fff">颜色 / 字体</button>
      <button data-tab="text"  style="flex:1;padding:12px 0;font-size:10px;letter-spacing:.12em;border:none;cursor:pointer;text-transform:uppercase;background:transparent;border-bottom:2px solid transparent;color:#555">文字</button>
      <button data-tab="ratio" style="flex:1;padding:12px 0;font-size:10px;letter-spacing:.12em;border:none;cursor:pointer;text-transform:uppercase;background:transparent;border-bottom:2px solid transparent;color:#555">比例</button>
    </div>
    <!-- panel content -->
    <div id="panel-color" style="padding:18px 16px 24px;overflow-y:auto"></div>
    <div id="panel-text"  style="padding:18px 16px 24px;overflow-y:auto;display:none"></div>
    <div id="panel-ratio" style="padding:18px 16px 24px;overflow-y:auto;display:none"></div>
  </div>

  <!-- export -->
  <div style="padding:12px 16px 32px;background:#111;border-top:1px solid #1A1A1A">
    <button id="btn-export" style="width:100%;padding:14px 0;background:#fff;color:#111;border:none;font-size:11px;letter-spacing:.22em;font-weight:700;text-transform:uppercase;border-radius:3px;cursor:pointer">导出 PNG</button>
  </div>
</div>

<div id="export-overlay">
  <img id="export-img" src="" alt=""/>
  <div class="exp-hint">长按图片 → 存储到相册<br/>或点击下方按钮关闭</div>
  <button class="exp-close" onclick="closeExport()">关闭</button>
</div>

<script>
/* ═══ CONSTANTS ═══ */
const SEASONS={en:['SPRING','SUMMER','AUTUMN','WINTER'],zh:['春','夏','秋','冬']}
const M2S=[3,3,0,0,0,1,1,1,2,2,2,3]
const now=new Date(), m0=M2S[now.getMonth()]

const FONTS=[
  {label:'OPPO Sans（中文无衬线）',  val:"'OPPO Sans','Noto Sans SC',sans-serif"},
  {label:'Noto Sans SC（思源黑体）', val:"'Noto Sans SC',sans-serif"},
  {label:'Noto Serif SC（思源宋体）',val:"'Noto Serif SC',serif"},
  {label:'Ma Shan Zheng（楷体）',    val:"'Ma Shan Zheng',cursive"},
  {label:'EB Garamond（衬线）',      val:"'EB Garamond',serif"},
  {label:'Playfair Display（衬线）', val:"'Playfair Display',serif"},
  {label:'Helvetica（无衬线）',      val:"'Helvetica Neue',Helvetica,Arial,sans-serif"},
  {label:'Courier（等宽）',          val:"'Courier Prime',monospace"},
  {label:'Cinzel（古典）',           val:"'Cinzel',serif"},
]
const PBG   =['#3D4EBF','#8B5A2B','#7A1F1F','#1A3A2A','#2C2C3A','#F5EDD6','#111111','#C8B8A2']
const PSTAMP=['#F5EDD6','#D4A96A','#C84B31','#EEEEEE','#1C1C1C','#E8D5B0','#A8C4BC','#3D4EBF']
const PTEXT =['#FFFFFF','#1C1C1C','#3D4EBF','#8B5A2B','#C84B31','#F5EDD6','#D4A96A','#888888']
const RATIOS=[
  {id:'1:1',  label:'1:1',     w:280,r:1},
  {id:'3:4',  label:'3:4 竖',  w:260,r:3/4},
  {id:'4:3',  label:'4:3 横',  w:320,r:4/3},
  {id:'9:16', label:'9:16 竖', w:240,r:9/16},
  {id:'16:9', label:'16:9 横', w:340,r:16/9},
]
const PAD=18,BI=11,MARGIN=32,NOTCH=4

const state={
  image:null, imgX:0,imgY:0,imgScale:1,
  bg:'#3D4EBF', stampColor:'#F5EDD6', textColor:'#1C1C1C',
  font:FONTS[0].val,
  year:String(now.getFullYear()),
  seasonEn:SEASONS.en[m0], seasonZh:SEASONS.zh[m0],
  cityZh:'城市名', cityEn:'CITY NAME',
  showText:true, panel:'color', ratio:RATIOS[1],
  geoStatus:'idle',
}

/* ═══ STAMP PATH（向外凸出） ═══ */
function stampPath(W,H,inset=0,r=NOTCH){
  const x0=inset,y0=inset,w=W-inset*2,h=H-inset*2
  const tN=Math.max(4,Math.round(w/(r*2*2.1)))
  const sN=Math.max(4,Math.round(h/(r*2*2.1)))
  const hs=w/tN,vs=h/sN
  let d=`M ${x0+r} ${y0}`
  for(let i=0;i<tN;i++){const x=x0+i*hs+hs/2;d+=` L ${x-r} ${y0} A ${r} ${r} 0 0 0 ${x+r} ${y0}`}
  d+=` L ${x0+w-r} ${y0} Q ${x0+w} ${y0} ${x0+w} ${y0+r}`
  for(let i=0;i<sN;i++){const y=y0+i*vs+vs/2;d+=` L ${x0+w} ${y-r} A ${r} ${r} 0 0 1 ${x0+w} ${y+r}`}
  d+=` L ${x0+w} ${y0+h-r} Q ${x0+w} ${y0+h} ${x0+w-r} ${y0+h}`
  for(let i=tN-1;i>=0;i--){const x=x0+i*hs+hs/2;d+=` L ${x+r} ${y0+h} A ${r} ${r} 0 0 0 ${x-r} ${y0+h}`}
  d+=` L ${x0+r} ${y0+h} Q ${x0} ${y0+h} ${x0} ${y0+h-r}`
  for(let i=sN-1;i>=0;i--){const y=y0+i*vs+vs/2;d+=` L ${x0} ${y+r} A ${r} ${r} 0 0 0 ${x0} ${y-r}`}
  d+=` L ${x0} ${y0+r} Q ${x0} ${y0} ${x0+r} ${y0} Z`
  return d
}

/* ═══ 计算尺寸 ═══ */
function getDims(){
  const {ratio,showText}=state
  const imgW=ratio.w-PAD*2
  const imgH=Math.round(imgW/ratio.r)
  const tzH=showText?68:0
  const sW=ratio.w, sH=PAD+imgH+(showText?8:0)+tzH+PAD
  const cW=sW+MARGIN*2, cH=sH+MARGIN*2
  return {imgW,imgH,tzH,sW,sH,cW,cH}
}

/* ═══════════════════════════════════════════
   TARGETED DOM UPDATES — 不重建整个页面
═══════════════════════════════════════════ */

function updateStampSize(){
  const {imgW,imgH,tzH,sW,sH,cW,cH}=getDims()
  // 外层容器
  const ex=document.getElementById('stamp-export')
  ex.style.width=cW+'px'; ex.style.height=cH+'px'
  // bg层
  document.getElementById('stamp-bg').style.background=state.bg
  // 邮票层定位
  const inner=document.getElementById('stamp-inner')
  inner.style.top=MARGIN+'px'; inner.style.left=MARGIN+'px'
  inner.style.width=sW+'px'; inner.style.height=sH+'px'
  // SVG
  const svg=document.getElementById('stamp-svg')
  svg.setAttribute('width',sW); svg.setAttribute('height',sH)
  document.getElementById('svg-outer').setAttribute('d',stampPath(sW,sH,0,NOTCH))
  document.getElementById('svg-outer').setAttribute('fill',state.stampColor)
  document.getElementById('svg-inner').setAttribute('d',stampPath(sW,sH,BI,3))
  document.getElementById('svg-inner').setAttribute('stroke',state.textColor)
  // crop-wrap
  const cw=document.getElementById('crop-wrap')
  cw.style.top=PAD+'px'; cw.style.left=PAD+'px'
  cw.style.width=imgW+'px'; cw.style.height=imgH+'px'
  // text area
  const tz=document.getElementById('stamp-text')
  tz.style.top=(PAD+imgH+8)+'px'; tz.style.left=PAD+'px'
  tz.style.width=imgW+'px'; tz.style.height=tzH+'px'
  tz.style.display=state.showText?'flex':'none'
  // placeholder color/font
  const ph=document.getElementById('img-placeholder')
  ph.style.color=state.textColor; ph.style.fontFamily=state.font
}

function updateColors(){
  document.getElementById('stamp-bg').style.background=state.bg
  document.getElementById('svg-outer').setAttribute('fill',state.stampColor)
  document.getElementById('svg-inner').setAttribute('stroke',state.textColor)
  // text colors
  const ids=['txt-meta','txt-city-zh','txt-city-en']
  ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.color=state.textColor })
  document.getElementById('img-placeholder').style.color=state.textColor
  // active dots
  document.querySelectorAll('[data-dot]').forEach(b=>{
    const active=state[b.dataset.key]===b.dataset.dot
    b.style.border=active?'2px solid #fff':'2px solid transparent'
    b.style.outline=active?'2px solid #555':'none'
  })
}

function updateFont(){
  const font=state.font
  const ids=['txt-meta','txt-city-zh','txt-city-en','img-placeholder']
  ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.fontFamily=font })
}

function updateTextContent(){
  const {year,seasonEn,seasonZh,cityZh,cityEn,ratio}=state
  const imgW=ratio.w-PAD*2
  const cityFS=Math.min(20,imgW/Math.max(cityZh.length,1)*1.1+4)
  const meta=document.getElementById('txt-meta')
  const czh=document.getElementById('txt-city-zh')
  const cen=document.getElementById('txt-city-en')
  if(meta) meta.textContent=`${year} · ${seasonEn} · ${seasonZh}`
  if(czh){ czh.textContent=cityZh; czh.style.fontSize=cityFS+'px' }
  if(cen) cen.textContent=cityEn
}

function updateGeoBar(){
  const bar=document.getElementById('geo-bar')
  const {geoStatus}=state
  if(geoStatus==='idle'){bar.style.display='none';return}
  bar.style.display='block'
  const map={
    loading:`<div style="background:#1A2A1A;border-top:1px solid #2A3A2A;padding:8px 16px;font-size:10px;color:#4CAF50;letter-spacing:.12em;display:flex;align-items:center;gap:6px"><span class="spin">◌</span> 正在从照片 GPS 读取位置…</div>`,
    found:`<div style="background:#1A2A1A;border-top:1px solid #2A3A2A;padding:8px 16px;font-size:10px;color:#4CAF50;letter-spacing:.12em">📍 已自动识别位置 · 可在「文字」标签修改</div>`,
    none:`<div style="background:#1E1E1E;border-top:1px solid #2A2A2A;padding:8px 16px;font-size:10px;color:#555;letter-spacing:.12em">照片无 GPS 信息 · 请手动输入城市</div>`,
  }
  bar.innerHTML=map[geoStatus]||''
}

/* ═══ 面板内容（只在初始化和切换 tab 时重建） ═══ */
function buildColorPanel(){
  const dots=(presets,key)=>presets.map(c=>`
    <button data-dot="${c}" data-key="${key}"
      style="width:26px;height:26px;border-radius:50%;background:${c};border:${state[key]===c?'2px solid #fff':'2px solid transparent'};outline:${state[key]===c?'2px solid #555':'none'};cursor:pointer;flex-shrink:0;padding:0"></button>
  `).join('')
  const row=(label,key,presets)=>`
    <div style="margin-bottom:16px">
      <div style="font-size:9px;letter-spacing:.18em;color:#666;margin-bottom:7px;text-transform:uppercase">${label}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${dots(presets,key)}
        <input type="color" data-colorpicker="${key}" value="${state[key]}"
          style="width:32px;height:26px;border:none;background:none;cursor:pointer;padding:0;flex-shrink:0"/>
      </div>
    </div>`
  document.getElementById('panel-color').innerHTML=`
    ${row('背景色','bg',PBG)}
    ${row('邮票色','stampColor',PSTAMP)}
    ${row('文字色','textColor',PTEXT)}
    <div>
      <div style="font-size:9px;letter-spacing:.18em;color:#666;margin-bottom:7px;text-transform:uppercase">字体</div>
      <select id="font-select" style="width:100%;background:#222;border:1px solid #2E2E2E;color:#eee;padding:8px 9px;font-size:13px;border-radius:3px;cursor:pointer">
        ${FONTS.map(f=>`<option value="${f.val}"${state.font===f.val?' selected':''}>${f.label}</option>`).join('')}
      </select>
    </div>`
  document.getElementById('font-select').onchange=e=>{state.font=e.target.value;updateFont()}
}

function buildTextPanel(){
  const geoBadge=state.geoStatus==='loading'
    ?`<span style="font-size:8px;padding:1px 6px;border-radius:10px;background:#1E3A1E;color:#4CAF50;margin-left:6px">定位中…</span>`
    :state.geoStatus==='found'
    ?`<span style="font-size:8px;padding:1px 6px;border-radius:10px;background:#1E3A1E;color:#4CAF50;margin-left:6px">📍 自动识别</span>`
    :''
  const field=(label,key,badge='')=>`
    <div style="margin-bottom:12px;flex:1">
      <div style="display:flex;align-items:center;margin-bottom:5px">
        <span style="font-size:9px;letter-spacing:.15em;color:#666;text-transform:uppercase">${label}</span>${badge}
      </div>
      <input class="txt-input" data-field="${key}" value="${state[key].replace(/"/g,'&quot;')}" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>`
  document.getElementById('panel-text').innerHTML=`
    <div style="display:flex;gap:10px">${field('年份','year')}<div style="flex:1"></div></div>
    <div style="display:flex;gap:10px">${field('季节 EN','seasonEn')}${field('季节 ZH','seasonZh')}</div>
    ${field('城市（中文）','cityZh',geoBadge)}
    ${field('城市（英文）','cityEn')}
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <input type="checkbox" id="cb-showtext" ${state.showText?'checked':''} style="accent-color:#fff;width:15px;height:15px"/>
      <label for="cb-showtext" style="font-size:10px;letter-spacing:.1em;color:#666;cursor:pointer">显示文字区域</label>
    </div>`
  document.getElementById('cb-showtext').onchange=e=>{
    state.showText=e.target.checked
    updateStampSize(); updateTextContent()
  }
}

function buildRatioPanel(){
  document.getElementById('panel-ratio').innerHTML=`
    <div>
      <div style="font-size:9px;letter-spacing:.18em;color:#666;margin-bottom:7px;text-transform:uppercase">尺寸比例</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${RATIOS.map(r=>`<button data-ratio="${r.id}"
          style="padding:7px 12px;background:${state.ratio.id===r.id?'#fff':'#222'};color:${state.ratio.id===r.id?'#111':'#666'};border:1px solid ${state.ratio.id===r.id?'#fff':'#333'};border-radius:3px;font-size:10px;letter-spacing:.1em;cursor:pointer;white-space:nowrap">
          ${r.label}</button>`).join('')}
      </div>
    </div>`
}

/* ═══ TAB SWITCHING ═══ */
function switchTab(tab){
  state.panel=tab
  ;['color','text','ratio'].forEach(t=>{
    const btn=document.querySelector(`[data-tab="${t}"]`)
    const panel=document.getElementById(`panel-${t}`)
    const active=t===tab
    btn.style.background=active?'#1E1E1E':'transparent'
    btn.style.borderBottom=active?'2px solid #fff':'2px solid transparent'
    btn.style.color=active?'#fff':'#555'
    panel.style.display=active?'block':'none'
  })
  if(tab==='text') buildTextPanel()
}

/* ═══ IMAGE CROP ═══ */
function initCropAfterLoad(){
  const {imgW,imgH}=getDims()
  const img=document.getElementById('crop-img')
  function setup(){
    const nw=img.naturalWidth,nh=img.naturalHeight
    const sc=Math.max(imgW/nw,imgH/nh)
    state.imgScale=sc
    state.imgX=(imgW-nw*sc)/2
    state.imgY=(imgH-nh*sc)/2
    applyTransform()
  }
  if(img.complete&&img.naturalWidth) setup()
  else img.onload=setup
  bindCrop()
}

function applyTransform(){
  const img=document.getElementById('crop-img')
  if(img) img.style.transform=`translate(${state.imgX}px,${state.imgY}px) scale(${state.imgScale})`
}

function clampPos(x,y,scale){
  const img=document.getElementById('crop-img')
  if(!img)return{x,y}
  const {imgW,imgH}=getDims()
  const nw=img.naturalWidth*scale,nh=img.naturalHeight*scale
  return{x:Math.min(0,Math.max(imgW-nw,x)),y:Math.min(0,Math.max(imgH-nh,y))}
}

let cropBound=false
function bindCrop(){
  if(cropBound)return
  cropBound=true
  const wrap=document.getElementById('crop-wrap')
  let t0=null,lastDist=null
  wrap.addEventListener('touchstart',e=>{
    e.preventDefault()
    if(e.touches.length===1){t0={x:e.touches[0].clientX-state.imgX,y:e.touches[0].clientY-state.imgY};lastDist=null}
    if(e.touches.length===2){lastDist=dist(e.touches);t0=null}
  },{passive:false})
  wrap.addEventListener('touchmove',e=>{
    e.preventDefault()
    if(e.touches.length===1&&t0){
      const c=clampPos(e.touches[0].clientX-t0.x,e.touches[0].clientY-t0.y,state.imgScale)
      state.imgX=c.x;state.imgY=c.y;applyTransform()
    }
    if(e.touches.length===2&&lastDist){
      const d2=dist(e.touches),ratio=d2/lastDist
      const ns=Math.min(8,Math.max(0.3,state.imgScale*ratio))
      const md=mid(e.touches),rect=wrap.getBoundingClientRect()
      const cx=md.x-rect.left,cy=md.y-rect.top
      state.imgX=cx-(cx-state.imgX)*(ns/state.imgScale)
      state.imgY=cy-(cy-state.imgY)*(ns/state.imgScale)
      state.imgScale=ns
      const c=clampPos(state.imgX,state.imgY,ns)
      state.imgX=c.x;state.imgY=c.y;applyTransform()
      lastDist=d2
    }
  },{passive:false})
  wrap.addEventListener('touchend',e=>{if(e.touches.length<2)lastDist=null;if(!e.touches.length)t0=null})
  let md2=null
  wrap.addEventListener('mousedown',e=>{md2={x:e.clientX-state.imgX,y:e.clientY-state.imgY}})
  wrap.addEventListener('mousemove',e=>{if(!md2)return;const c=clampPos(e.clientX-md2.x,e.clientY-md2.y,state.imgScale);state.imgX=c.x;state.imgY=c.y;applyTransform()})
  wrap.addEventListener('mouseup',()=>md2=null)
  wrap.addEventListener('wheel',e=>{e.preventDefault();state.imgScale=Math.min(8,Math.max(0.3,state.imgScale*(1-e.deltaY*0.001)));applyTransform()},{passive:false})
}
function dist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
function mid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2}}

/* ═══ FILE HANDLING ═══ */
async function handleFile(input){
  const file=input.files[0];if(!file)return
  state.imgX=0;state.imgY=0;state.imgScale=1;cropBound=false
  const reader=new FileReader()
  reader.onload=ev=>{
    state.image=ev.target.result
    const img=document.getElementById('crop-img')
    img.src=ev.target.result
    img.style.display='block'
    document.getElementById('img-placeholder').style.display='none'
    document.getElementById('crop-hint').style.display='block'
    document.getElementById('btn-upload').textContent='换图'
    initCropAfterLoad()
  }
  reader.readAsDataURL(file)
  try{
    const all=await exifr.parse(file,{pick:['DateTimeOriginal','CreateDate']})
    const dt=all?.DateTimeOriginal||all?.CreateDate
    if(dt){const d=dt instanceof Date?dt:new Date(dt);if(!isNaN(d)){
      state.year=String(d.getFullYear())
      const mm=d.getMonth();state.seasonEn=SEASONS.en[M2S[mm]];state.seasonZh=SEASONS.zh[M2S[mm]]
      updateTextContent()
      // refresh text panel inputs if open
      if(state.panel==='text') buildTextPanel()
    }}
  }catch(e){}
  state.geoStatus='loading';updateGeoBar()
  try{
    const gps=await exifr.gps(file)
    if(!gps?.latitude){state.geoStatus='none';updateGeoBar();return}
    const [r1,r2]=await Promise.all([
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${gps.latitude}&lon=${gps.longitude}&format=json&accept-language=zh-CN`),
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${gps.latitude}&lon=${gps.longitude}&format=json&accept-language=en`)
    ])
    const [d1,d2]=await Promise.all([r1.json(),r2.json()])
    const a1=d1.address||{},a2=d2.address||{}
    const zh=a1.city||a1.town||a1.village||a1.county||a1.state||''
    const en=(a2.city||a2.town||a2.village||a2.county||a2.state||'').toUpperCase()
    if(zh)state.cityZh=zh
    if(en)state.cityEn=en
    state.geoStatus=zh?'found':'none'
    updateTextContent()
    if(state.panel==='text') buildTextPanel()
  }catch(e){state.geoStatus='none'}
  updateGeoBar()
}

/* ═══ EXPORT ═══ */
async function doExport(){
  const btn=document.getElementById('btn-export')
  btn.textContent='生成中…';btn.style.background='#ccc';btn.style.pointerEvents='none'
  const hint=document.getElementById('crop-hint');if(hint)hint.style.display='none'
  try{
    const {cW,cH}=getDims()
    const SCALE=3
    // 创建离屏容器，fixed 定位在屏幕外，overflow:hidden 给 html2canvas 用
    const offscreen=document.createElement('div')
    offscreen.style.cssText=`position:fixed;left:-9999px;top:0;width:${cW}px;height:${cH}px;overflow:hidden;border-radius:6px;`
    offscreen.style.background=state.bg
    // 克隆邮票内容
    const src=document.getElementById('stamp-export')
    const clone=src.cloneNode(true)
    clone.style.cssText=`position:relative;width:${cW}px;height:${cH}px;overflow:hidden;`
    // clone 里的 bg div 可能尺寸不对，直接设背景在 offscreen 上
    const bgDiv=clone.querySelector('#stamp-bg')
    if(bgDiv) bgDiv.remove()
    offscreen.appendChild(clone)
    document.body.appendChild(offscreen)
    const canvas=await html2canvas(offscreen,{
      scale:SCALE,useCORS:true,backgroundColor:state.bg,logging:false,
      width:cW,height:cH,
    })
    document.body.removeChild(offscreen)
    const dataUrl=canvas.toDataURL('image/png')
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)
    if(isIOS){
      document.getElementById('export-img').src=dataUrl
      document.getElementById('export-overlay').classList.add('show')
    }else{
      const a=document.createElement('a')
      a.download=`stamp-${state.cityEn.replace(/\s/g,'_')}.png`
      a.href=dataUrl;a.click()
    }
  }catch(e){console.error(e);alert('生成失败，请重试')}
  if(hint)hint.style.display='block'
  btn.textContent='导出 PNG';btn.style.background='#fff';btn.style.pointerEvents=''
}

function closeExport(){
  document.getElementById('export-overlay').classList.remove('show')
  setTimeout(()=>{document.getElementById('export-img').src=''},300)
}

/* ═══ GLOBAL EVENT LISTENERS ═══ */
// tabs
document.querySelectorAll('[data-tab]').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab))
})

// color dots（事件委托）
document.getElementById('app').addEventListener('click',e=>{
  // dot button
  const dot=e.target.closest('[data-dot]')
  if(dot){
    state[dot.dataset.key]=dot.dataset.dot
    updateColors()
    return
  }
  // ratio button
  const rb=e.target.closest('[data-ratio]')
  if(rb){
    state.ratio=RATIOS.find(r=>r.id===rb.dataset.ratio)
    state.imgX=0;state.imgY=0;state.imgScale=1;cropBound=false
    updateStampSize();updateTextContent()
    buildRatioPanel()
    if(state.image){
      setTimeout(initCropAfterLoad,50)
    }
    return
  }
})

// color picker input
document.getElementById('app').addEventListener('input',e=>{
  // color picker
  if(e.target.dataset.colorpicker){
    state[e.target.dataset.colorpicker]=e.target.value
    updateColors()
    return
  }
  // text fields — update state only, no redraw
  const f=e.target.dataset.field
  if(!f)return
  let v=e.target.value
  if(f==='cityEn') v=v.toUpperCase()
  state[f]=v
  updateTextContent()
})

// upload
document.getElementById('btn-upload').addEventListener('click',()=>document.getElementById('filein').click())
document.getElementById('filein').addEventListener('change',()=>handleFile(document.getElementById('filein')))
document.getElementById('btn-export').addEventListener('click',doExport)

/* ═══ INIT ═══ */
updateStampSize()
updateColors()
updateFont()
updateTextContent()
buildColorPanel()
buildRatioPanel()
</script>
